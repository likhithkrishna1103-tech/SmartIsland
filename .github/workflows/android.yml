name: Build Android APK

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
    paths-ignore: &non_code_paths
      - "**/*.md"
      - "assets/**"
      - "screenshots/**"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
  pull_request:
    branches: [main, dev]
    paths-ignore: *non_code_paths
  workflow_dispatch:

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  verify:
    name: Lint and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run lint and unit tests
        run: ./gradlew --no-daemon --stacktrace lintDebug testDebugUnitTest

      - name: Upload lint reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports-${{ github.run_attempt }}
          path: app/build/reports/lint-results-*.html
          if-no-files-found: warn
          retention-days: 14

      - name: Build debug APK
        if: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/dev' }}
        run: ./gradlew --no-daemon --stacktrace assembleDebug

      - name: Upload debug APK
        if: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/dev' }}
        uses: actions/upload-artifact@v4
        with:
          name: SmartIsland-debug-${{ github.run_attempt }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

  release:
    name: Build signed release
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      apk_name: ${{ steps.version.outputs.apk_name }}
      version_tag: ${{ steps.version.outputs.version_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Read and validate version
        id: version
        run: |
          VERSION=$(sed -nE 's/^[[:space:]]*versionName[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' app/build.gradle.kts | head -n 1)
          test -n "$VERSION" || { echo "Unable to read versionName" >&2; exit 1; }
          VERSION_TAG="v$VERSION"

          if [[ "$GITHUB_REF" == refs/tags/* && "$GITHUB_REF_NAME" != "$VERSION_TAG" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match app version $VERSION_TAG" >&2
            exit 1
          fi

          echo "VERSION_TAG=$VERSION_TAG" >> "$GITHUB_ENV"
          echo "APK_NAME=SmartIsland-$VERSION_TAG.apk" >> "$GITHUB_ENV"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "apk_name=SmartIsland-$VERSION_TAG.apk" >> "$GITHUB_OUTPUT"

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          : "${ANDROID_KEYSTORE_BASE64:?ANDROID_KEYSTORE_BASE64 is not configured}"
          : "${ANDROID_KEYSTORE_PASSWORD:?ANDROID_KEYSTORE_PASSWORD is not configured}"

      - name: Prepare release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/smartIsland.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n[:space:]' | base64 --decode > "$KEYSTORE_PATH"

          KEY_ALIAS=$(keytool -list -v -keystore "$KEYSTORE_PATH" -storepass "$ANDROID_KEYSTORE_PASSWORD" 2>/dev/null | sed -n 's/^Alias name: //p' | head -n 1)
          test -n "$KEY_ALIAS" || { echo "Unable to detect a key alias" >&2; exit 1; }

          echo "SIGNING_STORE_FILE=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "SIGNING_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"

      - name: Build signed release APK
        run: ./gradlew --no-daemon --stacktrace assembleRelease

      - name: Verify and stage APK
        run: |
          SOURCE_APK="app/build/outputs/apk/release/app-release.apk"
          OUTPUT_APK="app/build/outputs/apk/release/$APK_NAME"
          APKSIGNER="$ANDROID_HOME/build-tools/$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -printf '%f\n' | sort -V | tail -n 1)/apksigner"

          test -f "$SOURCE_APK" || { echo "Release APK was not produced" >&2; exit 1; }
          cp "$SOURCE_APK" "$OUTPUT_APK"
          "$APKSIGNER" verify --verbose --print-certs "$OUTPUT_APK"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartIsland-release-${{ github.run_attempt }}
          path: app/build/outputs/apk/release/SmartIsland-v*.apk
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub release
    if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: SmartIsland-release-${{ github.run_attempt }}

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          APK_NAME: ${{ needs.release.outputs.apk_name }}
          VERSION_TAG: ${{ needs.release.outputs.version_tag }}
        run: |
          TAG="$VERSION_TAG"
          [[ "$GITHUB_REF" == refs/tags/* ]] && TAG="$GITHUB_REF_NAME"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK_NAME" --clobber
          else
            gh release create "$TAG" "$APK_NAME" \
              --title "Smart Island $TAG" \
              --generate-notes
          fi
