name: Build Android APK

on:
  push:
    branches: [ "main", "dev" ]
    tags: [ "v*" ]
    paths-ignore:
      - "**.md"
      - "assets/**"
      - "screenshots/**"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
  pull_request:
    branches: [ "main", "dev" ]
    paths-ignore:
      - "**.md"
      - "assets/**"
      - "screenshots/**"
      - "LICENSE"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and Package Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Version Name
        run: |
          VERSION_NAME=$(grep -E 'versionName\s*=' app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          echo "VERSION_NAME=v$VERSION_NAME" >> "$GITHUB_ENV"
          echo "APK_NAME=SmartIsland-v$VERSION_NAME.apk" >> "$GITHUB_ENV"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle Executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/dev'
        run: ./gradlew assembleDebug

      - name: Rename Debug APK
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/dev'
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/smart-island-debug.apk

      - name: Upload Debug APK Artifact
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/dev'
        uses: actions/upload-artifact@v4
        with:
          name: smart-island-debug-apk
          path: app/build/outputs/apk/debug/smart-island-debug.apk
          if-no-files-found: error

      - name: Validate Release Signing Secrets
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"

      - name: Decode Release Keystore
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/smartIsland.jks"
          echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n[:space:]' | base64 --decode > "$KEYSTORE_PATH"

      - name: Prepare Release Signing Environment
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          KEY_ALIAS=$(keytool -list -v -keystore "$KEYSTORE_PATH" -storepass "$ANDROID_KEYSTORE_PASSWORD" 2>/dev/null | sed -n 's/^Alias name: //p' | head -n 1)
          if [ -z "$KEY_ALIAS" ]; then
            echo "Could not detect key alias from the keystore."
            exit 1
          fi
          echo "SIGNING_STORE_FILE=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "SIGNING_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"

      - name: Build Signed APK
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew assembleRelease

      - name: Rename Release APK
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        run: cp app/build/outputs/apk/release/app-release.apk "app/build/outputs/apk/release/$APK_NAME"

      - name: Verify Release APK Signature
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        run: |
          APKSIGNER="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)/apksigner"
          "$APKSIGNER" verify --verbose --print-certs "app/build/outputs/apk/release/$APK_NAME"

      - name: Upload Release APK Artifact
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: smart-island-release-apk
          path: app/build/outputs/apk/release/SmartIsland-v*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="$GITHUB_REF_NAME"
          else
            TAG="$VERSION_NAME"
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "app/build/outputs/apk/release/$APK_NAME" \
              --clobber
          else
            gh release create "$TAG" \
              "app/build/outputs/apk/release/$APK_NAME" \
              --title "Smart Island $TAG" \
              --notes "Signed Smart Island release built automatically by GitHub Actions."
          fi
