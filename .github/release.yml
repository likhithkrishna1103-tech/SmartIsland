changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: "Breaking changes"
      labels:
        - breaking-change
        - semver-major
    - title: "New features and improvements"
      labels:
        - enhancement
        - feature
        - semver-minor
    - title: "Bug fixes"
      labels:
        - bug
        - fix
    - title: "Documentation"
      labels:
        - documentation
    - title: "Dependencies and maintenance"
      labels:
        - dependencies
        - maintenance
    - title: "Other changes"
      labels:
        - "*"
